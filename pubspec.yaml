name: sirat_e_mustaqeem
description: Flutter project for Muslim brothers
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # Core & Utils
  dio: ^5.7.0
  dartz: ^0.10.1
  equatable: ^2.0.5
  rxdart: ^0.28.0
  shared_preferences: ^2.3.2
  sqflite: ^2.3.3
  path_provider: ^2.1.4
  url_launcher: ^6.3.1
  connectivity_plus: ^6.1.5
  permission_handler: ^11.3.1
  
  # UI & Assets
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.16
  flutter_screenutil: ^5.9.3
  flutter_staggered_grid_view: ^0.7.0
  google_fonts: ^6.2.1
  lottie: ^3.1.2
  cupertino_icons: ^1.0.8
  
  # State Management & Data
  flutter_bloc: ^9.0.0
  hydrated_bloc: ^10.1.1
  
  # Muslim & Calendar features
  muslim_data_flutter: ^1.5.0
  hijri_calendar: ^1.0.7+7
  quran: ^1.4.1
  qcf_quran: 0.0.5
  intl: 0.20.2
  
  
  # Media & Sensors
  just_audio: ^0.9.41
  audio_session: ^0.1.25
  video_player: ^2.9.1
  geolocator: ^13.0.1
  geocoding: ^3.0.0
  sensors_plus: ^6.0.1
  flutter_timezone: ^2.0.0
  flutter_local_notifications: ^21.0.0
  share_plus: ^13.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/latest.db
    - assets/images/core/json/
    - assets/images/core/svg/
    - assets/images/error/lottie_json/
    - assets/images/navigation_icon/svg/
    - assets/images/home_icon/svg/
    - assets/images/home_icon/lottie_json/
    - assets/images/collection_icon/svg/
    - assets/images/qiblat_icon/svg/
    - assets/images/praying_time/svg/
    - assets/images/setting_icon/svg/
    - assets/images/permission/lottie_json/
    - assets/images/tasbih_icon/svg/
    - assets/images/dua_icon/svg/
    - assets/images/quran_icon/svg/
    - assets/images/image_of_the_day/
    - assets/sound/

  fonts:
    - family: Uthman
      fonts:
        - asset: assets/fonts/Uthman-Taha-Naskh-Regular.otf
        - asset: assets/fonts/Uthman-Taha-Naskh-Bold.otf
          weight: 700
    - family: Jameel
      fonts:
        - asset: assets/fonts/jameel.ttf
    - family: "arsura"
      fonts:
        - asset: assets/fonts/arsura.ttf
