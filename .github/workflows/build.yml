name: Build Android APK

on:
  push:
    branches:
      - master
  workflow_dispatch: {}

jobs:
  build:
    name: Build debug-signed release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n

      # Criação do arquivo de chaves para evitar erros de compilação
      - name: Create mock keys.dart
        run: |
          mkdir -p lib/src/core/
          echo "const String kGoogleCloudApiKey = 'API_KEY_FICTICIA_PARA_BUILD';" > lib/src/core/keys.dart

      - name: Build APK
        run: |
          flutter build apk --release --android-skip-build-dependency-validation

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sirat-e-mustaqeem-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14
